{% extends "global/Page.html" %}
{% load otree %}

{{ block content }}
    <div class="card shadow-sm">
        <div class="card-body text-center">
            <h4 class="mb-4"><b>請稍候，獨立的 ChatGPT 正在判斷您的理由</b></h4>
            
            <div class="spinner-border text-primary m-4" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>

            <div style="min-height: 80px; display: flex; align-items: center; justify-content: center;">
                <p id="status-msg" class="text-center text-muted">
                    等待獨立的 ChatGPT 判斷結果中...
                </p>
            </div>
        </div>
    </div>     

    <button id="auto-submit" style="display: none;" class="otree-btn-next btn btn-primary">Next</button>

    <style>
        .card {
            max-width: 600px;
            margin: 10% auto;
        }

        #status-msg {
            transition: opacity 0.3s ease-in-out;
            opacity: 1;
        }
    </style>

    <script>
        window.onload = function() {
            const statusMsg = document.getElementById('status-msg');
            const messages = [
                "等待獨立的ChatGPT判斷結果中...",
                "此過程大約需要1-3分鐘，請勿重新整理或關閉視窗。"
            ];
            let currentIndex = 0;

            function rotateText() {
                statusMsg.style.opacity = 0;

                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % messages.length;
                    statusMsg.innerText = messages[currentIndex];

                    statusMsg.style.opacity = 1;
                }, 300);
            }

            let rotateTimer = setInterval(rotateText, 5000);

//////////////////////////////////////////////////////////////////////////////////////////

            // 1. 頁面載入後立刻透過 WebSocket 通知後端啟動 Thread
            liveSend({"type": "API_start"});

            // 2. 設定輪詢 (Polling)：每 3 秒檢查一次進度
            // 這不只是檢查進度，更能維持 WebSocket 活性，避免 Heroku 55秒斷線
            let checkTimer = setInterval(function() {
                liveSend({"type": "check_status"});
            }, 3000);

            // 3. 處理來自 live_method 的回傳數據
            window.liveRecv = function(data) {
                if (data.status === "started") {
                    statusMsg.innerText = "此過程大約需要1-3分鐘，請勿重新整理或關閉視窗。";
                }
                
                if (data.status === "finished") {
                    // 停止計時器並提交頁面
                    clearInterval(checkTimer);
                    statusMsg.innerText = "理由判斷完成！";
                    // 觸發 oTree 標準的表單提交
                    document.getElementById('form').submit();
                }
            };
        };
    </script>
{{ endblock }}
